<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Astrid Suarez | Galería</title>

<style>
*, *::before, *::after { box-sizing: border-box; }

body {
    margin: 0;
    background: #111;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

/* ── Header ─────────────────────────────────────────────────────────── */
header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
}

header h1 {
    margin: 0;
    font-weight: 500;
    font-size: 2rem;
    letter-spacing: 0.5px;
}

header p {
    margin-top: 0.4rem;
    color: #aaa;
    font-size: 1rem;
}

.header-count {
    display: inline-block;
    margin-top: 0.5rem;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 3px 14px;
    font-size: 0.85rem;
    color: #ccc;
    letter-spacing: 0.3px;
}

.contact {
    margin-top: 1rem;
    font-size: 1rem;
}

.contact a {
    color: #fff;
    text-decoration: none;
    font-weight: 500;
}

.contact a:hover { text-decoration: underline; }

/* ── Masonry gallery ─────────────────────────────────────────────────── */
.gallery {
    max-width: 1200px;
    margin: auto;
    padding: 0 1rem 3rem;
    columns: 3 300px;
    column-gap: 18px;
}

figure {
    margin: 0 0 18px;
    break-inside: avoid;
    background: #1a1a1a;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}

figure:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.6);
}

figure img {
    width: 100%;
    height: auto;
    display: block;
}

figcaption {
    padding: 10px 12px 4px;
    font-size: 0.9rem;
    color: #bbb;
    text-transform: capitalize;
    letter-spacing: 0.3px;
}

.fig-footer {
    padding: 6px 12px 12px;
}

.wa-btn {
    display: inline-block;
    font-size: 0.78rem;
    color: #25d366;
    text-decoration: none;
    border: 1px solid #25d36644;
    border-radius: 20px;
    padding: 3px 10px;
    transition: background 0.15s;
}

.wa-btn:hover {
    background: rgba(37,211,102,0.12);
}

/* ── Lightbox ────────────────────────────────────────────────────────── */
#lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 1rem;
}

#lightbox.open { display: flex; }

#lightbox img {
    max-width: min(90vw, 1000px);
    max-height: 80vh;
    border-radius: 6px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    object-fit: contain;
}

#lightbox-caption {
    margin-top: 1rem;
    font-size: 1.1rem;
    color: #ddd;
    text-transform: capitalize;
    letter-spacing: 0.4px;
}

#lightbox-close {
    position: absolute;
    top: 18px;
    right: 22px;
    font-size: 2rem;
    color: #fff;
    background: none;
    border: none;
    cursor: pointer;
    line-height: 1;
    opacity: 0.7;
    transition: opacity 0.15s;
}

#lightbox-close:hover { opacity: 1; }

#lightbox-prev,
#lightbox-next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 2.2rem;
    color: #fff;
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 50%;
    width: 52px;
    height: 52px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.15s, background 0.15s;
}

#lightbox-prev:hover,
#lightbox-next:hover { opacity: 1; background: rgba(255,255,255,0.18); }

#lightbox-prev { left: 14px; }
#lightbox-next { right: 14px; }

/* ── Scroll-to-top ───────────────────────────────────────────────────── */
#scroll-top {
    position: fixed;
    bottom: 28px;
    right: 24px;
    background: rgba(255,255,255,0.12);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 1.3rem;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    z-index: 500;
}

#scroll-top.visible { display: flex; }
#scroll-top:hover   { background: rgba(255,255,255,0.22); }

/* ── Footer ─────────────────────────────────────────────────────────── */
footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 0.8rem;
    color: #666;
}
</style>
</head>

<body>

<header>
  <h1>Astrid Suarez</h1>
  <p>Colección de Pinturas</p>
  <div class="header-count" id="header-count"></div>
  <div class="contact">
    Contacto:
    <a href="https://wa.me/50372796888" target="_blank">503 7279 6888 (WhatsApp)</a>
  </div>
</header>

<main class="gallery" id="gallery"></main>

<footer>
  © 2026 Astrid Suarez — Todos los derechos reservados
</footer>

<!-- Lightbox -->
<div id="lightbox" role="dialog" aria-modal="true">
  <button id="lightbox-close" aria-label="Cerrar">&times;</button>
  <button id="lightbox-prev"  aria-label="Anterior">&#8249;</button>
  <img id="lightbox-img" src="" alt="" />
  <div id="lightbox-caption"></div>
  <button id="lightbox-next"  aria-label="Siguiente">&#8250;</button>
</div>

<!-- Scroll to top -->
<button id="scroll-top" aria-label="Volver arriba">&#8679;</button>

<script>
const paintings = [
"arbol-de-fuego.jpg",
"atardecer.jpg",
"bosque-brumoso.jpg",
"bosque-en-blanco-y-negro.jpg",
"bosque-en-rojo.jpg",
"bosque-en-verano.jpg",
"bosque-encantado.jpg",
"bosque.jpg",
"camino-del-bosque.jpg",
"colleccion-privada.jpg",
"cordillera-de-ahuachapan.jpg",
"cordillera.jpg",
"cortez-blanco.jpg",
"desnudos.jpg",
"entre-cafetales.jpg",
"flor-de-cactus.jpg",
"flor-de-fuego.jpg",
"floracion.jpg",
"flores-en-amarillo.jpg",
"flores-en-azul.jpg",
"flores.jpg",
"galan-de-noche.jpg",
"geranios.jpg",
"impresion-azul.jpg",
"jacaranda.jpg",
"jugando-en-la-playa.jpg",
"la-dama-de-las-flores.jpg",
"laguna-verde.jpg",
"llamarada-del-bosque.jpg",
"manglar.jpg",
"maquilishuat.jpg",
"margaritas.jpg",
"marina.jpg",
"meditando.jpg",
"montanas-de-apaneca.jpg",
"montecristo.jpg",
"nuestras-montanas.jpg",
"oriente-rio-torola.jpg",
"orquidia.jpg",
"panoramica-desde-el-volcan-de-santa-.jpg",
"panoramica.jpg",
"ramillete.jpg",
"rio-lempa.jpg",
"rio-torola.jpg",
"sause-amarillo.jpg",
"sinfonia-en-rojo.jpg",
"soledad.jpg",
"valle-de-jiboa.jpg",
"vientos.jpg",
"zona-oriental.jpg"
];

// ── Build gallery ──────────────────────────────────────────────────────
const gallery = document.getElementById("gallery");
document.getElementById("header-count").textContent = paintings.length + " obras";

paintings.forEach((file, index) => {
    const name = file.replace(/\.[^.]+$/, "").replace(/-/g, " ");
    const waMsg = encodeURIComponent("Hola Astrid, me interesa la obra \"" + name + "\". ¿Podría darme más información?");
    const waUrl = "https://wa.me/50372796888?text=" + waMsg;

    const figure = document.createElement("figure");

    const img = document.createElement("img");
    img.src     = "paintings/" + file;
    img.loading = "lazy";
    img.alt     = name;

    const caption = document.createElement("figcaption");
    caption.textContent = name;

    const figFooter = document.createElement("div");
    figFooter.className = "fig-footer";

    const waLink = document.createElement("a");
    waLink.href      = waUrl;
    waLink.target    = "_blank";
    waLink.rel       = "noopener noreferrer";
    waLink.className = "wa-btn";
    waLink.textContent = "💬 Consultar";

    figFooter.appendChild(waLink);
    figure.appendChild(img);
    figure.appendChild(caption);
    figure.appendChild(figFooter);
    gallery.appendChild(figure);

    // Open lightbox on image click
    img.addEventListener("click", () => openLightbox(index));
});

// ── Lightbox ───────────────────────────────────────────────────────────
const lightbox    = document.getElementById("lightbox");
const lbImg       = document.getElementById("lightbox-img");
const lbCaption   = document.getElementById("lightbox-caption");
const lbClose     = document.getElementById("lightbox-close");
const lbPrev      = document.getElementById("lightbox-prev");
const lbNext      = document.getElementById("lightbox-next");
let currentIndex  = 0;

function openLightbox(index) {
    currentIndex = index;
    showLightboxItem();
    lightbox.classList.add("open");
    document.body.style.overflow = "hidden";
}

function closeLightbox() {
    lightbox.classList.remove("open");
    document.body.style.overflow = "";
}

function showLightboxItem() {
    const file  = paintings[currentIndex];
    const name  = file.replace(/\.[^.]+$/, "").replace(/-/g, " ");
    lbImg.src     = "paintings/" + file;
    lbImg.alt     = name;
    lbCaption.textContent = name;
}

lbClose.addEventListener("click", closeLightbox);
lightbox.addEventListener("click", (e) => { if (e.target === lightbox) closeLightbox(); });

lbPrev.addEventListener("click", () => {
    currentIndex = (currentIndex - 1 + paintings.length) % paintings.length;
    showLightboxItem();
});

lbNext.addEventListener("click", () => {
    currentIndex = (currentIndex + 1) % paintings.length;
    showLightboxItem();
});

document.addEventListener("keydown", (e) => {
    if (!lightbox.classList.contains("open")) return;
    if (e.key === "Escape")      closeLightbox();
    if (e.key === "ArrowLeft")  { currentIndex = (currentIndex - 1 + paintings.length) % paintings.length; showLightboxItem(); }
    if (e.key === "ArrowRight") { currentIndex = (currentIndex + 1) % paintings.length;                    showLightboxItem(); }
});

// ── Scroll to top ──────────────────────────────────────────────────────
const scrollBtn = document.getElementById("scroll-top");
window.addEventListener("scroll", () => {
    scrollBtn.classList.toggle("visible", window.scrollY > 400);
});
scrollBtn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
</script>

</body>
</html>
